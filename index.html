<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縮小率計算</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  padding: 20px;
  background: #111;
  color: #fff;
  text-align: center;
}

h1 {
  font-size: 22px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  font-size: 28px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-bottom: 15px;
  text-align: center;
}

.result {
  font-size: 42px;
  font-weight: bold;
  margin: 25px 0;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

button {
  font-size: 20px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #333;
  color: white;
}

button:active {
  background: #666;
}
</style>
</head>

<body>

<h1>縮小率計算</h1>

<input 
  type="number" 
  id="input" 
  placeholder="拡大率 (%)"
  inputmode="decimal"
  oninput="calc()"
/>

<div class="result" id="result">-- %</div>

<div class="buttons">
  <button onclick="setVal(200)">200%</button>
  <button onclick="setVal(150)">150%</button>
  <button onclick="setVal(133.33)">133%</button>
  <button onclick="setVal(120)">120%</button>
  <button onclick="setVal(110)">110%</button>
  <button onclick="setVal(100)">100%</button>
</div>

<script>
function calc() {
  const val = parseFloat(document.getElementById("input").value);
  const result = document.getElementById("result");

  if (!val || val <= 0) {
    result.innerText = "-- %";
    return;
  }

  const reduction = 100 / val;
  result.innerText = reduction.toFixed(2) + " %";
}

function setVal(v) {
  document.getElementById("input").value = v;
  calc();
}
</script>

</body>
</html>
