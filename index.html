<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縮小率計算</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  padding: 20px;
  background: #111;
  color: #fff;
  text-align: center;
}

.tabs {
  display: flex;
  overflow-x: auto;
  gap: 8px;
  margin-bottom: 15px;
}

.tab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 8px 12px;
  border-radius: 20px;
  background: #333;
  font-size: 14px;
}

.tab.active {
  background: #fff;
  color: #000;
}

input {
  width: 100%;
  font-size: 24px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  text-align: center;
}

.result {
  font-size: 40px;
  font-weight: bold;
  margin: 20px 0;
}

.add-box {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.add-box input {
  flex: 1;
}

.add-box button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #444;
  color: #fff;
}
</style>
</head>

<body>

<h2>縮小率計算</h2>

<div class="tabs" id="tabs"></div>

<input 
  type="number" 
  id="input" 
  placeholder="拡大率 (%)"
  inputmode="decimal"
  oninput="calc()"
/>

<div class="result" id="result">-- %</div>

<div class="add-box">
  <input type="number" id="newVal" placeholder="倍率追加">
  <button onclick="addPreset()">追加</button>
</div>

<script>
let presets = JSON.parse(localStorage.getItem("presets")) || [200,150,133.33];

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  presets.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "tab";
    div.innerHTML = `
      ${p}%
      <span onclick="event.stopPropagation(); removePreset(${i})">✕</span>
    `;
    div.onclick = () => selectTab(p, div);
    tabs.appendChild(div);
  });
}

function savePresets() {
  localStorage.setItem("presets", JSON.stringify(presets));
}

function addPreset() {
  const val = parseFloat(document.getElementById("newVal").value);
  if (!val) return;

  presets.push(val);
  savePresets();
  renderTabs();

  document.getElementById("newVal").value = "";
}

function removePreset(index) {
  presets.splice(index, 1);
  savePresets();
  renderTabs();
}

function selectTab(value, el) {
  document.getElementById("input").value = value;
  calc();

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

function calc() {
  const val = parseFloat(document.getElementById("input").value);
  const result = document.getElementById("result");

  if (!val || val <= 0) {
    result.innerText = "-- %";
    return;
  }

  // ★ここが最重要（0表示対策済み）
  const percent = 10000 / val;

  result.innerText = percent
    .toFixed(2)
    .replace(/\.00$/, "") + " %";
}

renderTabs();
</script>

</body>
</html>
