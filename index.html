<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縮小率計算</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  padding: 20px;
  background: #111;
  color: #fff;
  text-align: center;
}

h1 {
  font-size: 20px;
  margin-bottom: 15px;
}

/* タブ */
.tabs {
  display: flex;
  overflow-x: auto;
  gap: 8px;
  margin-bottom: 15px;
}

.tab {
  flex: 0 0 auto;
  padding: 10px 15px;
  border-radius: 20px;
  background: #333;
  font-size: 16px;
}

.tab.active {
  background: #fff;
  color: #000;
}

/* 入力 */
input {
  width: 100%;
  font-size: 26px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-bottom: 15px;
  text-align: center;
}

/* 結果 */
.result {
  font-size: 42px;
  font-weight: bold;
  margin: 25px 0;
}
</style>
</head>

<body>

<h1>縮小率計算</h1>

<div class="tabs">
  <div class="tab" onclick="selectTab(200, this)">200%</div>
  <div class="tab" onclick="selectTab(150, this)">150%</div>
  <div class="tab" onclick="selectTab(133.33, this)">133%</div>
  <div class="tab" onclick="selectTab(120, this)">120%</div>
  <div class="tab" onclick="selectTab(110, this)">110%</div>
  <div class="tab" onclick="selectTab(100, this)">100%</div>
</div>

<input 
  type="number" 
  id="input" 
  placeholder="拡大率 (%)"
  inputmode="decimal"
  oninput="calc()"
/>

<div class="result" id="result">-- %</div>

<script>
function calc() {
  const val = parseFloat(document.getElementById("input").value);
  const result = document.getElementById("result");

  if (!val || val <= 0) {
    result.innerText = "-- %";
    return;
  }

  const reduction = 100 / val;

  result.innerText = reduction
    .toFixed(2)
    .replace(/\.00$/, "") + " %";
}

function selectTab(value, el) {
  document.getElementById("input").value = value;
  calc();

  // active切り替え
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}
</script>

</body>
</html>
